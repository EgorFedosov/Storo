server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;
  set $forwarded_proto $scheme;
  if ($http_x_forwarded_proto != "") {
    set $forwarded_proto $http_x_forwarded_proto;
  }

  location /api/ {
    proxy_pass https://storo-backend-latest.onrender.com/api/;
    proxy_http_version 1.1;
    proxy_set_header Host storo-backend-latest.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_ssl_server_name on;
    proxy_ssl_name storo-backend-latest.onrender.com;
  }

  location /hubs/ {
    proxy_pass https://storo-backend-latest.onrender.com/hubs/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host storo-backend-latest.onrender.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_ssl_server_name on;
    proxy_ssl_name storo-backend-latest.onrender.com;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
