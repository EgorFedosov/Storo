  services:
    postgres:
      image: postgres:16
      container_name: course-postgres
      environment:
        POSTGRES_DB: course_db
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
      ports:
        - "5433:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data
      restart: unless-stopped

  volumes:
    pgdata: